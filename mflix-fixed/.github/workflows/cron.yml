name: 🤖 MFLIX-PRO Auto-Pilot Engine

on:
  schedule:
    # Runs every 5 minutes — GitHub Actions minimum interval
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: false
        default: 'process-queue'
        type: choice
        options:
          - process-queue
          - heal
          - both

jobs:
  # ── 1. Main Queue Processor ──────────────────────────────────────────────────
  process-queue:
    name: '⚡ Process Queue'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.action == 'process-queue' || inputs.action == 'both'))
    steps:
      - name: Trigger queue processor
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer MflixProSecret123" \
            -H "x-cron-secret: MflixProSecret123" \
            --max-time 90 \
            "https://nwwuio.vercel.app/api/cron/process-queue")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Queue processor returned $response"
          fi

  # ── 2. Auto-Heal Engine (Phase 4) ────────────────────────────────────────────
  heal:
    name: '🩺 Auto-Heal Engine'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.action == 'heal' || inputs.action == 'both'))
    steps:
      - name: Run auto-healing engine
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer MflixProSecret123" \
            -H "x-cron-secret: MflixProSecret123" \
            --max-time 90 \
            "https://nwwuio.vercel.app/api/system/heal")
          echo "Heal response: $response"
